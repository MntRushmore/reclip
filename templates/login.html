<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rushil's Personal Downloader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --fg: #3a3a38;
      --accent: #e85d2a;
      --accent-hover: #d04e1f;
      --muted: #9c9889;
      --card: #fff;
      --card-border: #e2ded6;
      --error: #c43d3d;
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { width: 100%; max-width: 380px; }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 em { font-style: italic; color: var(--accent); }
    p.sub {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 36px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 93, 42, 0.08);
    }
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    button:hover { background: var(--accent-hover); }
    .title-short { display: none; }
    @media (max-width: 500px) {
      .title-full { display: none; }
      .title-short { display: inline; }
    }
    .error {
      font-size: 0.72rem;
      color: var(--error);
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1><span class="title-full">Rushil's Personal <em>Downloader</em></span><span class="title-short">R.P.<em>D</em></span></h1>
    <p class="sub">Family access only</p>
    <form method="POST" action="/login">
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password">
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
